<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Azalaï Hotels — Tableau de bord opérationnel</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap');
:root{
  --bx:#8B1A2E;--bx-pale:rgba(139,26,46,0.08);--bx-mid:rgba(139,26,46,0.15);
  --or:#C9A96E;--or-pale:rgba(201,169,110,0.12);
  --surface:#FDFAF5;--surface2:#F5EFE6;--surface3:#EDE3D4;
  --bordure:#DDD0BC;--texte:#2C1810;--texte2:#7A6855;--texte3:#B5A090;
  --vert:#2D7A4F;--vert-pale:rgba(45,122,79,0.08);
  --rouge:#C0392B;--rouge-pale:rgba(192,57,43,0.08);--rouge-bordure:rgba(192,57,43,0.3);
  --orange:#D4761E;--orange-pale:rgba(212,118,30,0.08);--orange-bordure:rgba(212,118,30,0.3);
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--surface);color:var(--texte);font-family:'Inter',sans-serif;min-height:100vh}

.header{background:var(--bx);color:white}
.header-top{display:flex;justify-content:space-between;align-items:center;padding:20px 36px;border-bottom:1px solid rgba(255,255,255,0.1)}
.logo{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:600;letter-spacing:3px;text-transform:uppercase}
.logo span{color:var(--or);font-weight:400}
.logo-sub{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.4);margin-top:2px}
.header-date{font-size:11px;color:rgba(255,255,255,0.5);text-align:right}
.header-title{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--or);margin-top:3px;text-align:right}

.container{max-width:960px;margin:0 auto;padding:32px 36px 60px}

/* BANNIERE ACTION */
.action-banner{background:var(--rouge-pale);border:1px solid var(--rouge-bordure);border-radius:6px;padding:14px 18px;display:flex;align-items:center;gap:14px;margin-bottom:28px;cursor:pointer;transition:background 0.15s}
.action-banner:hover{background:rgba(192,57,43,0.12)}
.ab-icon{font-size:20px;flex-shrink:0}
.ab-body{flex:1}
.ab-titre{font-size:13px;font-weight:600;color:var(--rouge)}
.ab-sub{font-size:12px;color:var(--texte2);margin-top:2px}
.ab-arrow{font-size:18px;color:var(--rouge)}

/* HÔTELS GRID */
.hotels-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:32px}
.hotel-card{background:white;border-radius:6px;border:1px solid var(--bordure);overflow:hidden;cursor:pointer;transition:box-shadow 0.2s,transform 0.15s}
.hotel-card:hover{box-shadow:0 4px 20px rgba(139,26,46,0.1);transform:translateY(-1px)}
.hotel-card.selected{border-color:var(--bx);box-shadow:0 0 0 2px rgba(139,26,46,0.15)}
.hc-flag{height:3px;width:100%}
.hc-body{padding:14px 16px}
.hc-nom{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:600;color:var(--texte)}
.hc-ville{font-size:11px;color:var(--texte2);letter-spacing:0.5px;margin-top:2px}
.hc-metrics{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
.hc-metric{background:var(--surface2);border-radius:4px;padding:8px 10px}
.hc-metric-val{font-size:17px;font-weight:600;line-height:1}
.hc-metric-label{font-size:10px;color:var(--texte2);margin-top:3px;text-transform:uppercase;letter-spacing:0.5px}
.hc-footer{padding:10px 16px;background:var(--surface2);display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--bordure)}
.pill{padding:3px 10px;border-radius:2px;font-size:10px;font-weight:600;letter-spacing:0.5px;text-transform:uppercase}
.pill-ok{background:var(--vert-pale);color:var(--vert)}
.pill-warn{background:var(--orange-pale);color:var(--orange)}
.pill-danger{background:var(--rouge-pale);color:var(--rouge)}
.hc-bar{height:3px;background:var(--bordure);border-radius:2px;overflow:hidden;margin:10px 16px}
.hc-bar-fill{height:100%;border-radius:2px;transition:width 0.5s}

/* SECTION TITRE */
.section-title{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:600;color:var(--texte);margin-bottom:4px}
.section-sub{font-size:11px;color:var(--texte2);letter-spacing:0.5px;margin-bottom:16px}

/* DÉTAIL HÔTEL */
.detail-panel{display:none;background:white;border-radius:6px;border:1px solid var(--bordure);overflow:hidden;margin-bottom:28px;animation:slideIn 0.2s ease}
.detail-panel.open{display:block}
@keyframes slideIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.dp-header{background:var(--bx);color:white;padding:16px 20px;display:flex;justify-content:space-between;align-items:center}
.dp-nom{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:600}
.dp-sub{font-size:11px;color:rgba(255,255,255,0.5);margin-top:3px;letter-spacing:0.5px}
.dp-close{background:none;border:none;color:rgba(255,255,255,0.6);font-size:20px;cursor:pointer;line-height:1}
.dp-close:hover{color:white}
.dp-body{padding:20px}

/* 2 MÉTRIQUES BUSINESS */
.biz-metrics{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px}
.bm{border-radius:6px;border:1px solid var(--bordure);padding:16px 18px}
.bm.normal{background:var(--surface2)}
.bm.danger{background:var(--rouge-pale);border-color:var(--rouge-bordure)}
.bm.warn{background:var(--orange-pale);border-color:var(--orange-bordure)}
.bm-label{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--texte2);margin-bottom:8px;font-weight:600}
.bm-val{font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:600;line-height:1;letter-spacing:-0.5px}
.bm-sub{font-size:11px;color:var(--texte2);margin-top:5px}

/* ACTION CARD */
.action-card{background:var(--surface2);border-radius:6px;border-left:3px solid var(--bordure);padding:14px 16px;margin-bottom:18px;display:flex;justify-content:space-between;align-items:center;gap:16px}
.action-card.danger{border-left-color:var(--rouge);background:var(--rouge-pale)}
.action-card.warn{border-left-color:var(--orange);background:var(--orange-pale)}
.action-card.ok{border-left-color:var(--vert);background:var(--vert-pale)}
.ac-titre{font-size:13px;font-weight:600;color:var(--texte)}
.ac-sub{font-size:12px;color:var(--texte2);margin-top:2px}
.ac-cout{text-align:right;flex-shrink:0}
.ac-cout-val{font-size:15px;font-weight:600;color:var(--texte)}
.ac-cout-label{font-size:11px;color:var(--texte2);margin-top:2px}

/* GROUPES DANS DÉTAIL */
.groupe-detail{border:1px solid var(--bordure);border-radius:6px;overflow:hidden;margin-bottom:10px}
.gd-header{padding:12px 14px;border-bottom:1px solid var(--bordure);display:flex;justify-content:space-between;align-items:center;background:var(--surface2)}
.gd-nom{font-size:13px;font-weight:600}
.gd-saisie{font-size:11px;color:var(--texte2);margin-top:2px}
.gd-body{padding:12px 14px}
.gd-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:10px}
.gd-stat-label{font-size:11px;color:var(--texte2)}
.gd-stat-val{font-size:14px;font-weight:600;margin-top:2px}
.gd-bar{height:4px;background:var(--bordure);border-radius:2px;overflow:hidden}
.gd-bar-fill{height:100%;border-radius:2px}

/* GRAPHIQUE */
.chart-card{border:1px solid var(--bordure);border-radius:6px;overflow:hidden;margin-bottom:18px}
.chart-head{padding:12px 16px;border-bottom:1px solid var(--bordure);display:flex;justify-content:space-between;align-items:center;background:var(--surface2)}
.chart-head-title{font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:600}
.chart-body{padding:16px}
.chart-insight{margin-top:10px;padding-top:10px;border-top:1px solid var(--bordure);font-size:12px}

/* MÉTRIQUES SECONDAIRES */
.secondary-metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.sm{background:var(--surface2);border-radius:6px;padding:12px 14px}
.sm-val{font-size:18px;font-weight:600;color:var(--texte)}
.sm-label{font-size:11px;color:var(--texte2);margin-top:3px}
.sm-sub{font-size:10px;color:var(--texte3);margin-top:2px}

/* RÉSUMÉ SEMAINE */
.week-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:28px}
.wk{background:white;border-radius:6px;border:1px solid var(--bordure);padding:14px 16px}
.wk-val{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:600;color:var(--texte)}
.wk-label{font-size:10px;color:var(--texte2);margin-top:4px;text-transform:uppercase;letter-spacing:0.5px}
.wk-sub{font-size:11px;color:var(--texte3);margin-top:2px}

/* DIVIDER */
.divider{height:1px;background:var(--bordure);margin:28px 0;position:relative}
.divider::after{content:'◆';position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);background:var(--surface);padding:0 12px;color:var(--or);font-size:9px}

/* FOOTER */
.footer{background:var(--bx);color:rgba(255,255,255,0.4);text-align:center;padding:18px;font-size:11px;letter-spacing:1px;margin-top:40px}
.footer strong{color:var(--or)}

.tooltip-wrap{position:relative;display:inline-flex;align-items:center;gap:4px}
.tooltip-icon{width:15px;height:15px;border-radius:50%;border:1px solid var(--texte3);color:var(--texte3);font-size:10px;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;line-height:1;user-select:none}
.tooltip-icon:hover{border-color:var(--texte2);color:var(--texte2)}
.tooltip-bubble{display:none;position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);background:var(--texte);color:white;font-size:11px;line-height:1.5;padding:8px 12px;border-radius:6px;width:220px;z-index:10;font-weight:400;font-family:'Inter',sans-serif}
.tooltip-bubble::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:var(--texte)}
.tooltip-wrap:hover .tooltip-bubble{display:block}
.loading{padding:40px;text-align:center;color:var(--texte2);font-size:13px}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--bordure);border-top-color:var(--bx);border-radius:50%;animation:spin 0.8s linear infinite;vertical-align:middle;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{padding:30px;text-align:center;color:var(--texte2);font-size:12px}

@media(max-width:700px){
  .container{padding:20px}.hotels-grid{grid-template-columns:1fr}
  .biz-metrics{grid-template-columns:1fr}.week-grid{grid-template-columns:repeat(2,1fr)}
  .gd-stats{grid-template-columns:repeat(2,1fr)}.secondary-metrics{grid-template-columns:1fr}
  .header-top{padding:16px 20px}
}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <div class="logo">Azalaï <span>Hotels</span></div>
      <div class="logo-sub">Tableau de bord opérationnel</div>
    </div>
    <div>
      <div class="header-date" id="header-date">—</div>
      <div class="header-title">Équipements critiques</div>
    </div>
  </div>
</div>

<div class="container">

  <!-- BANNIÈRE ACTIONS -->
  <div id="action-banner-wrap"></div>

  <!-- VUE GLOBALE -->
  <div class="section-title">Statut des établissements</div>
  <div class="section-sub" id="section-date">Données du jour</div>
  <div class="hotels-grid" id="hotels-grid">
    <div class="loading" style="grid-column:1/-1"><span class="spinner"></span>Chargement...</div>
  </div>

  <!-- DÉTAIL HÔTEL (s'ouvre au clic) -->
  <div class="detail-panel" id="detail-panel"></div>

  <div class="divider"></div>

  <!-- RÉSUMÉ SEMAINE GROUPE -->
  <div class="section-title">Cette semaine — Groupe Azalaï</div>
  <div class="section-sub">Consolidé sur tous les établissements</div>
  <div id="couts-annuels-wrap"></div>
  <div class="week-grid" id="week-grid">
    <div class="loading" style="grid-column:1/-1"><span class="spinner"></span></div>
  </div>

</div>

<div class="footer">Powered by <strong>GenTrack</strong> · Gestion intelligente des équipements critiques</div>

<script>
const SUPA_URL = 'https://zbpoxjlkqxnqjzxohasq.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpicG94amxrcXhucWp6eG9oYXNxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1MjM3ODAsImV4cCI6MjA5NzA5OTc4MH0.9-QyWgon93jGDo5QKMIh_-QbQZ_P9rQrYJnVxegJe7M';
const GROUPE = 'Azalai';

let detailChart = null;
let selectedClientId = null;
let _data = {};

async function api(table, q='', select='*') {
  const res = await fetch(`${SUPA_URL}/rest/v1/${table}?select=${select}${q}`, {
    headers:{'apikey':SUPA_KEY,'Authorization':`Bearer ${SUPA_KEY}`}
  });
  if(!res.ok) return [];
  return res.json();
}

function fmtNum(n){return Math.round(n).toLocaleString('fr-FR');}
function fmtDate(d){if(!d)return'—';return new Date(d).toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric'});}
function fmtDateShort(d){if(!d)return'—';return new Date(d).toLocaleDateString('fr-FR',{day:'2-digit',month:'short'});}
function carbColor(n){return n<25?'var(--rouge)':n<50?'var(--orange)':'var(--vert)';}
function autoColor(j){return j<2?'var(--rouge)':j<5?'var(--orange)':'var(--vert)';}
function statusClass(j,pannes){
  if(pannes>0||j<2)return'danger';
  if(j<5)return'warn';
  return'ok';
}

async function loadAll() {
  const now = new Date();
  document.getElementById('header-date').textContent = now.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  document.getElementById('section-date').textContent = `Données du ${now.toLocaleDateString('fr-FR',{day:'numeric',month:'long'})}`;

  const today = now.toISOString().split('T')[0];
  const dateDebut30 = new Date(Date.now()-30*86400000).toISOString().split('T')[0];
  const dateDebut7  = new Date(Date.now()-7*86400000).toISOString().split('T')[0];

  const dateDebutAnnee = new Date(new Date().getFullYear(),0,1).toISOString().split('T')[0];
  const [clients, groupes, saisiesJour, saisies30, alertes, pannes, pannesAnnee, saisiesAnnee] = await Promise.all([
    api('clients', `&groupe_hotelier=eq.${GROUPE}&actif=eq.true&order=nom`),
    api('groupes', '&actif=eq.true'),
    api('saisies', `&date=eq.${today}&order=created_at.desc`),
    api('saisies', `&date=gte.${dateDebut30}&order=date.desc`),
    api('alertes', '&resolue=eq.false'),
    api('pannes',  '&resolue=eq.false'),
    api('pannes',  `&resolue=eq.true&date_panne=gte.${dateDebutAnnee}`),
    api('saisies', `&date=gte.${dateDebutAnnee}`),
  ]);

  const clientIds = clients.map(c=>c.id);
  const cGroupes      = groupes.filter(g=>clientIds.includes(g.client_id));
  const cSaisiesJ     = saisiesJour.filter(s=>clientIds.includes(s.client_id));
  const cSaisies30    = saisies30.filter(s=>clientIds.includes(s.client_id));
  const cAlertes      = alertes.filter(a=>clientIds.includes(a.client_id));
  const cPannes       = pannes.filter(p=>clientIds.includes(p.client_id));
  const cPannesAnnee  = (pannesAnnee||[]).filter(p=>clientIds.includes(p.client_id));
  const cSaisiesAnnee = (saisiesAnnee||[]).filter(s=>clientIds.includes(s.client_id));
  const coutCarburantAnnee = Math.round(cSaisiesAnnee.reduce((a,s)=>a+(s.litres_ajoutes||0),0) * (clients[0]?.prix_litre_fcfa||695));
  const coutRepAnnee = cPannesAnnee.reduce((a,p)=>a+(p.cout_reparation||0),0);

  _data = { clients, cGroupes, cSaisiesJ, cSaisies30, cAlertes, cPannes, today, dateDebut7 };
  window._azalai = { ..._data, cPannesAnnee, cSaisiesAnnee };

  renderCoutsAnnuels(coutCarburantAnnee, coutRepAnnee, cPannesAnnee);
  renderBanner(clients, cGroupes, cSaisiesJ, cAlertes, cPannes);
  renderHotels(clients, cGroupes, cSaisiesJ, cSaisies30, cAlertes, cPannes, cPannesAnnee, cSaisiesAnnee);
  renderWeek(clients, cGroupes, cSaisies30.filter(s=>s.date>=dateDebut7), cAlertes, cPannes);
}

function calcAuto(groupe, saisie) {
  if(!saisie||saisie.niveau_carburant==null) return null;
  const cap = groupe.capacite_reservoir_litres||500;
  const cH  = groupe.conso_theorique_lh||1.8;
  const cJ  = cH * 8;
  const L   = cap * saisie.niveau_carburant / 100;
  return Math.round((L/cJ)*10)/10;
}

function cmdLitres(groupe, saisie) {
  if(!saisie||saisie.niveau_carburant==null) return null;
  const cap = groupe.capacite_reservoir_litres||500;
  return Math.round(cap*(1-saisie.niveau_carburant/100));
}

function renderBanner(clients, cGroupes, cSaisiesJ, cAlertes, cPannes) {
  const el = document.getElementById('action-banner-wrap');
  const urgents = [];
  clients.forEach(c=>{
    const hG = cGroupes.filter(g=>g.client_id===c.id);
    hG.forEach(g=>{
      const s = cSaisiesJ.filter(x=>x.groupe_id===g.id)[0];
      const j = calcAuto(g,s);
      if(j!==null&&j<2) urgents.push({nom:c.nom,groupe:g.nom,jours:j});
    });
  });
  const pannesCount = cPannes.length;
  const total = urgents.length + (pannesCount>0?1:0);
  if(total===0){el.innerHTML='';return;}
  const subs = [];
  if(urgents.length>0) subs.push(urgents.map(u=>`${u.nom} critique (${u.jours}j)`).join(' · '));
  if(pannesCount>0) subs.push(`${pannesCount} panne${pannesCount>1?'s':''} en cours`);
  // Trouver le premier client critique
  const premierCritique = urgents.length>0
    ? clients.find(c=>cGroupes.filter(g=>g.client_id===c.id).some(g=>{
        const s=cSaisiesJ.filter(x=>x.groupe_id===g.id)[0];
        const j=calcAuto(g,s);
        return j!==null&&j<2;
      }))
    : clients.find(c=>cPannes.some(p=>p.client_id===c.id));
  const cibleId = premierCritique?.id||'';
  el.innerHTML=`<div class="action-banner" onclick="openDetail('${cibleId}')"><div class="ab-icon">🚨</div><div class="ab-body"><div class="ab-titre">${total} action${total>1?'s':''} requise${total>1?'s':''} aujourd'hui</div><div class="ab-sub">${subs.join(' · ')}</div></div><div class="ab-arrow">›</div></div>`;
}

function renderHotels(clients, cGroupes, cSaisiesJ, cSaisies30, cAlertes, cPannes, cPannesAnnee, cSaisiesAnnee) {
  const el = document.getElementById('hotels-grid');
  if(!clients.length){el.innerHTML='<div class="empty">Aucun établissement</div>';return;}

  el.innerHTML = clients.map(c=>{
    const hG  = cGroupes.filter(g=>g.client_id===c.id);
    const hSJ = cSaisiesJ.filter(s=>s.client_id===c.id);
    const hA  = cAlertes.filter(a=>a.client_id===c.id);
    const hP  = cPannes.filter(p=>p.client_id===c.id);

    // Autonomie minimale parmi les groupes
    let minAuto = null;
    let totalCout30 = 0;
    let carbMoy = null;
    let carbSum = 0, carbCount = 0;

    hG.forEach(g=>{
      const s = hSJ.filter(x=>x.groupe_id===g.id)[0];
      const j = calcAuto(g,s);
      if(j!==null&&(minAuto===null||j<minAuto)) minAuto=j;
      if(s&&s.niveau_carburant!=null){carbSum+=s.niveau_carburant;carbCount++;}
    });
    if(carbCount>0) carbMoy = Math.round(carbSum/carbCount);

    const saisies30C = cSaisies30.filter(s=>s.client_id===c.id);
    const litres30 = saisies30C.reduce((a,s)=>a+(s.litres_ajoutes||0),0);
    totalCout30 = Math.round(litres30*(c.prix_litre_fcfa||695));

    const hPannesAnnee = (cPannesAnnee||[]).filter(p=>p.client_id===c.id);
    const hSaisiesAnnee = (cSaisiesAnnee||[]).filter(s=>s.client_id===c.id);
    const hCoutCarburantAnnee = Math.round(hSaisiesAnnee.reduce((a,s)=>a+(s.litres_ajoutes||0),0)*(c.prix_litre_fcfa||695));
    const hCoutRepAnnee = hPannesAnnee.reduce((a,p)=>a+(p.cout_reparation||0),0);
    const status = statusClass(minAuto??99, hP.length);
    const flagColor = status==='danger'?'var(--rouge)':status==='warn'?'var(--orange)':'var(--vert)';
    const pillClass = status==='danger'?'pill-danger':status==='warn'?'pill-warn':'pill-ok';
    const statusLabel = status==='danger'?'Critique':status==='warn'?'Attention':'Normal';
    const isSelected = selectedClientId===c.id;

    return `<div class="hotel-card${isSelected?' selected':''}" onclick="openDetail('${c.id}')">
      <div class="hc-flag" style="background:${flagColor}"></div>
      <div class="hc-body">
        <div class="hc-nom">${c.nom}</div>
        <div class="hc-ville">${c.ville||'—'} · ${hG.length} groupe${hG.length>1?'s':''}</div>
        <div class="hc-metrics">
          <div class="hc-metric">
            <div class="hc-metric-val" style="color:${minAuto!==null?autoColor(minAuto):'var(--texte2)'}">${minAuto!==null?minAuto+'j':'—'}</div>
            <div class="hc-metric-label"><span class="tooltip-wrap">Autonomie min.<span class="tooltip-icon">i</span><span class="tooltip-bubble">Litres restants divise par consommation journaliere estimee (conso theorique x 8h/jour).</span></span></div>
          </div>
          <div class="hc-metric">
            <div class="hc-metric-val" style="color:var(--texte)">${totalCout30>0?Math.round(totalCout30/1000)+'k':'—'}</div>
            <div class="hc-metric-label"><span class="tooltip-wrap">FCFA ce mois<span class="tooltip-icon">i</span><span class="tooltip-bubble">Litres ajoutes lors des pleins multiplies par le prix au litre configure. 30 derniers jours.</span></span></div>
          </div>
        </div>
      </div>
      <div class="hc-bar"><div class="hc-bar-fill" style="width:${carbMoy||0}%;background:${carbColor(carbMoy||0)}"></div></div>
      ${(hCoutCarburantAnnee>0||hCoutRepAnnee>0)?'<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:8px 16px;background:var(--surface2);border-top:1px solid var(--bordure)"><div style="font-size:10px;color:var(--texte2)">⛽ <span style="font-weight:500;color:var(--texte)">'+(hCoutCarburantAnnee>0?fmtNum(hCoutCarburantAnnee)+' FCFA':'—')+'</span></div><div style="font-size:10px;color:var(--texte2)">🔧 <span style="font-weight:500;color:'+(hCoutRepAnnee>0?'var(--orange)':'var(--vert)')+'">'+fmtNum(hCoutRepAnnee)+' FCFA</span></div></div>':''}
      <div class="hc-footer">
        <span class="pill ${pillClass}">${statusLabel}</span>
        <span style="font-size:11px;color:var(--texte2)">${hSJ.length}/${hG.length} saisies</span>
      </div>
    </div>`;
  }).join('');
}

async function openDetail(clientId) {
  const { clients, cGroupes, cSaisiesJ, cSaisies30, cAlertes, cPannes, today } = _data;
  const client = clients.find(c=>c.id===clientId);
  if(!client) return;

  selectedClientId = clientId;
  // Refresh surbrillance
  document.querySelectorAll('.hotel-card').forEach(el=>{
    el.classList.toggle('selected', el.getAttribute('onclick')===`openDetail('${clientId}')`);
  });

  const panel = document.getElementById('detail-panel');
  panel.classList.add('open');
  panel.scrollIntoView({behavior:'smooth',block:'start'});

  const hG    = cGroupes.filter(g=>g.client_id===clientId);
  const hSJ   = cSaisiesJ.filter(s=>s.client_id===clientId);
  const hA    = cAlertes.filter(a=>a.client_id===clientId);
  const hP    = cPannes.filter(p=>p.client_id===clientId);
  const hS30  = cSaisies30.filter(s=>s.client_id===clientId);

  // Calculs business
  const litres30  = hS30.reduce((a,s)=>a+(s.litres_ajoutes||0),0);
  const cout30    = Math.round(litres30*(client.prix_litre_fcfa||695));
  const heures30  = hS30.reduce((a,s)=>a+(s.heures_marche||0),0);
  const joursAvecSaisie = new Set(hS30.map(s=>s.date)).size;
  const tauxSaisie = hG.length>0 ? Math.round(joursAvecSaisie/(30*hG.length)*100) : 0;

  // Autonomie minimale + action
  let minAuto = null, minGroupe = null, minSaisie = null;
  hG.forEach(g=>{
    const s = hSJ.filter(x=>x.groupe_id===g.id)[0];
    const j = calcAuto(g,s);
    if(j!==null&&(minAuto===null||j<minAuto)){minAuto=j;minGroupe=g;minSaisie=s;}
  });

  const oPannesAnnee = (window._azalai?.cPannesAnnee||[]).filter(p=>p.client_id===clientId);
  const oSaisiesAnnee = (window._azalai?.cSaisiesAnnee||[]).filter(s=>s.client_id===clientId);
  const cCoutCarburantAnnee = Math.round(oSaisiesAnnee.reduce((a,s)=>a+(s.litres_ajoutes||0),0)*(client.prix_litre_fcfa||695));
  const cCoutRepAnnee = oPannesAnnee.reduce((a,p)=>a+(p.cout_reparation||0),0);
  const status = statusClass(minAuto??99, hP.length);
  const bmAutoClass = status==='danger'?'danger':status==='warn'?'warn':'normal';

  // Action recommandée
  let actionHtml = '';
  if(minGroupe&&minSaisie) {
    const litresCmd = cmdLitres(minGroupe, minSaisie);
    const coutCmd   = litresCmd ? Math.round(litresCmd*(client.prix_litre_fcfa||695)) : 0;
    if(minAuto!==null&&minAuto<5) {
      const urgence = minAuto<2?'danger':'warn';
      const delai   = minAuto<2?'avant demain soir':`dans ${Math.round(minAuto-2)} jours`;
      actionHtml = `<div class="action-card ${urgence}">
        <div>
          <div class="ac-titre">Commander ${fmtNum(litresCmd)}L ${delai}</div>
          <div class="ac-sub">${minGroupe.nom} · ${minSaisie.niveau_carburant}% · réservoir ${fmtNum(minGroupe.capacite_reservoir_litres||500)}L</div>
        </div>
        <div class="ac-cout">
          <div class="ac-cout-val">${fmtNum(coutCmd)} FCFA</div>
          <div class="ac-cout-label">coût estimé</div>
        </div>
      </div>`;
    } else {
      actionHtml = `<div class="action-card ok">
        <div><div class="ac-titre">Aucune action requise aujourd'hui</div><div class="ac-sub">Prochain plein estimé dans ~${minAuto} jours</div></div>
      </div>`;
    }
  }

  // Groupes détail
  const groupesHtml = hG.map(g=>{
    const s = hSJ.filter(x=>x.groupe_id===g.id)[0];
    const j = calcAuto(g,s);
    const carb = s?.niveau_carburant;
    const huile = s?.niveau_huile||'—';
    const huileColor = huile==='critique'?'var(--rouge)':huile==='bas'?'var(--orange)':'var(--vert)';
    const heureSaisie = s?.created_at ? new Date(s.created_at).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit',timeZone:'Africa/Dakar'}) : null;
    const statusG = statusClass(j??99,hP.filter(p=>p.groupe_id===g.id).length);
    const flagG = statusG==='danger'?'var(--rouge)':statusG==='warn'?'var(--orange)':'var(--vert)';

    return `<div class="groupe-detail">
      <div class="gd-header" style="border-left:3px solid ${flagG}">
        <div>
          <div class="gd-nom">${g.nom} — ${g.marque||''} ${g.puissance_kva||''}kVA</div>
          <div class="gd-saisie">${heureSaisie?`Saisi à ${heureSaisie}`:'Pas de saisie aujourd\'hui'}${s?.operateur?' · '+s.operateur:''}</div>
        </div>
        <span class="pill ${statusG==='danger'?'pill-danger':statusG==='warn'?'pill-warn':'pill-ok'}">${carb!=null?carb+'%':'—'}</span>
      </div>
      <div class="gd-body">
        <div class="gd-stats">
          <div><div class="gd-stat-label">Autonomie</div><div class="gd-stat-val" style="color:${j!==null?autoColor(j):'var(--texte2)'}">${j!==null?j+'j':'—'}</div></div>
          <div><div class="gd-stat-label">Heures/jour</div><div class="gd-stat-val">${s?.heures_marche!=null?s.heures_marche+'h':'—'}</div></div>
          <div><div class="gd-stat-label">Huile</div><div class="gd-stat-val" style="color:${huileColor}">${huile}</div></div>
          <div><div class="gd-stat-label">Total</div><div class="gd-stat-val">${g.heures_total||0}h / ${g.seuil_vidange_heures||250}h</div></div>
        </div>
        ${carb!=null?`<div class="gd-bar"><div class="gd-bar-fill" style="width:${carb}%;background:${carbColor(carb)}"></div></div>`:''}
      </div>
    </div>`;
  }).join('');

  // Graphique 14 jours
  const dateDebut14 = new Date(Date.now()-14*86400000).toISOString().split('T')[0];
  const hS14 = hS30.filter(s=>s.date>=dateDebut14);
  const byDate = {};
  hS14.forEach(s=>{
    if(!byDate[s.date])byDate[s.date]=[];
    if(s.niveau_carburant!=null)byDate[s.date].push(s.niveau_carburant);
  });
  const dates14 = Object.keys(byDate).sort();
  const carbData = dates14.map(d=>byDate[d].length?Math.round(byDate[d].reduce((a,b)=>a+b)/byDate[d].length):null);
  const trend = carbData.length>=2&&carbData[carbData.length-1]!==null&&carbData[0]!==null
    ? Math.round(carbData[carbData.length-1]-carbData[0]) : null;
  const trendTxt = trend!==null
    ? (trend<0?`<span style="color:var(--rouge)">Baisse de ${Math.abs(trend)} points en 14 jours</span>`:`<span style="color:var(--vert)">Stable sur 14 jours</span>`)
    : 'Données insuffisantes';

  // Alertes actives
  const alertesHtml = hA.length>0
    ? hA.map(a=>`<div style="padding:8px 12px;background:${a.severite==='danger'?'var(--rouge-pale)':'var(--orange-pale)'};border-radius:4px;font-size:12px;color:${a.severite==='danger'?'var(--rouge)':'var(--orange)'};margin-bottom:6px;font-weight:500">${a.severite==='danger'?'🚨':'⚠️'} ${a.message}</div>`).join('')
    : `<div style="padding:8px 12px;background:var(--vert-pale);border-radius:4px;font-size:12px;color:var(--vert);font-weight:500">✅ Aucune alerte active</div>`;

  panel.innerHTML = `
    <div class="dp-header">
      <div>
        <div class="dp-nom">${client.nom}</div>
        <div class="dp-sub">${client.ville||'—'} · ${hG.length} groupe${hG.length>1?'s':''} · ${client.prix_litre_fcfa||695} FCFA/L</div>
      </div>
      <button class="dp-close" onclick="closeDetail()">✕</button>
    </div>
    <div class="dp-body">
      <div class="biz-metrics">
        <div class="bm normal">
          <div class="bm-label"><span class="tooltip-wrap">Coût carburant — 30 jours<span class="tooltip-icon">ℹ</span><span class="tooltip-bubble">Litres ajoutés × \${client.prix_litre_fcfa||695} FCFA/L sur les 30 derniers jours.</span></span></div>
          <div class="bm-val" style="color:var(--texte)">${cout30>0?fmtNum(cout30):'—'}</div>
          <div class="bm-sub">FCFA · ${fmtNum(litres30)}L consommés</div>
        </div>
        <div class="bm ${bmAutoClass}">
          <div class="bm-label" style="color:${status==='danger'?'var(--rouge)':status==='warn'?'var(--orange)':'var(--texte2)'}"><span class="tooltip-wrap">Autonomie la plus basse<span class="tooltip-icon">i</span><span class="tooltip-bubble" style="color:white">Litres restants divise par consommation journaliere estimee. Base sur la derniere saisie du jour.</span></span></div>
          <div class="bm-val" style="color:${status==='danger'?'var(--rouge)':status==='warn'?'var(--orange)':'var(--vert)'}">${minAuto!==null?minAuto+' jours':'—'}</div>
          <div class="bm-sub" style="color:${status==='danger'?'var(--rouge)':status==='warn'?'var(--orange)':'var(--texte2)'}">${minGroupe?.nom||'—'}</div>
        </div>
      </div>

      ${(cCoutCarburantAnnee>0||cCoutRepAnnee>0)?`<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
        <div style="background:var(--surface2);border-radius:5px;padding:11px 13px"><div style="font-size:10px;text-transform:uppercase;letter-spacing:0.8px;color:var(--texte2);font-weight:500;margin-bottom:5px">⛽ Carburant ${new Date().getFullYear()}</div><div style="font-size:20px;font-weight:600;color:var(--texte)">${fmtNum(cCoutCarburantAnnee)}</div><div style="font-size:11px;color:var(--texte2);margin-top:2px">FCFA</div></div>
        <div style="background:var(--surface2);border-radius:5px;padding:11px 13px;border-top:2px solid ${cCoutRepAnnee>0?'var(--orange)':'var(--vert)'}"><div style="font-size:10px;text-transform:uppercase;letter-spacing:0.8px;color:var(--texte2);font-weight:500;margin-bottom:5px">🔧 Réparations ${new Date().getFullYear()}</div><div style="font-size:20px;font-weight:600;color:${cCoutRepAnnee>0?'var(--orange)':'var(--vert)'}">${fmtNum(cCoutRepAnnee)}</div><div style="font-size:11px;color:var(--texte2);margin-top:2px">${oPannesAnnee.length} intervention${oPannesAnnee.length>1?'s':''}</div></div>
      </div>`:''}
      ${actionHtml}

      ${hA.length>0?`<div style="margin-bottom:14px">${alertesHtml}</div>`:''}

      <div style="font-size:11px;color:var(--texte2);text-transform:uppercase;letter-spacing:1px;font-weight:600;margin-bottom:10px">Groupes</div>
      ${groupesHtml}

      <div class="chart-card" style="margin-top:16px">
        <div class="chart-head">
          <div class="chart-head-title">Évolution carburant — 14 jours</div>
          <div style="font-size:11px;color:var(--texte2)">Niveau moyen</div>
        </div>
        <div class="chart-body">
          <canvas id="detail-chart" height="130"></canvas>
          <div class="chart-insight" style="color:var(--texte2)">${trendTxt}</div>
        </div>
      </div>

      <div style="font-size:11px;color:var(--texte2);text-transform:uppercase;letter-spacing:1px;font-weight:600;margin:16px 0 10px">Ce mois — détail</div>
      <div class="secondary-metrics">
        <div class="sm"><div class="sm-val">${Math.round(heures30)}h</div><div class="sm-label">Heures de marche</div><div class="sm-sub">30 derniers jours</div></div>
        <div class="sm"><div class="sm-val" style="color:${tauxSaisie>=80?'var(--vert)':tauxSaisie>=50?'var(--orange)':'var(--rouge)'}">${tauxSaisie}%</div><div class="sm-label">Taux de saisie</div><div class="sm-sub">${joursAvecSaisie} jours / ${30*hG.length} attendus</div></div>
        <div class="sm"><div class="sm-val">${hP.length>0?hP.length:'0'}</div><div class="sm-label">Pannes en cours</div><div class="sm-sub">${hP.length>0?hP.map(p=>p.description||p.type).join(', '):'Aucune'}</div></div>
      </div>
    </div>`;

  // Render chart
  setTimeout(()=>{
    if(detailChart)detailChart.destroy();
    const ctx = document.getElementById('detail-chart');
    if(!ctx)return;
    detailChart = new Chart(ctx.getContext('2d'),{
      type:'line',
      data:{
        labels:dates14.map(fmtDateShort),
        datasets:[{
          data:carbData,
          borderColor:'#8B1A2E',
          backgroundColor:'rgba(139,26,46,0.06)',
          borderWidth:1.5,
          tension:0.3,
          fill:true,
          spanGaps:true,
          pointRadius:3,
          pointBackgroundColor:'#8B1A2E'
        }]
      },
      options:{
        responsive:true,
        plugins:{legend:{display:false}},
        scales:{
          x:{grid:{color:'#EDE3D4'},ticks:{color:'#7A6855',font:{size:10}}},
          y:{grid:{color:'#EDE3D4'},ticks:{color:'#7A6855',font:{size:10},callback:v=>v+'%'},min:0,max:100}
        }
      }
    });
  },50);
}

function closeDetail() {
  selectedClientId = null;
  document.getElementById('detail-panel').classList.remove('open');
  document.querySelectorAll('.hotel-card').forEach(el=>el.classList.remove('selected'));
}

function renderCoutsAnnuels(coutCarburantAnnee, coutRepAnnee, cPannesAnnee) {
  const el = document.getElementById('couts-annuels-wrap');
  if(!el) return;
  const annee = new Date().getFullYear();
  el.innerHTML = `<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px">
    <div style="background:white;border-radius:6px;border:1px solid var(--bordure);padding:14px 16px">
      <div style="font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--texte2);font-weight:500;margin-bottom:8px">⛽ Carburant — ${annee}</div>
      <div style="font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:600;color:var(--texte)">${coutCarburantAnnee>0?fmtNum(coutCarburantAnnee):'—'}</div>
      <div style="font-size:11px;color:var(--texte2);margin-top:4px">FCFA · coût d'exploitation</div>
    </div>
    <div style="background:white;border-radius:6px;border:1px solid var(--bordure);border-top:3px solid ${coutRepAnnee>0?'var(--orange)':'var(--vert)'};padding:14px 16px">
      <div style="font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--texte2);font-weight:500;margin-bottom:8px">🔧 Réparations — ${annee}</div>
      <div style="font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:600;color:${coutRepAnnee>0?'var(--orange)':'var(--vert)'}">${fmtNum(coutRepAnnee)}</div>
      <div style="font-size:11px;color:var(--texte2);margin-top:3px">${cPannesAnnee.length} intervention${cPannesAnnee.length>1?'s':''} résolue${cPannesAnnee.length>1?'s':''}</div>
    </div>
  </div>`;
}

function renderWeek(clients, cGroupes, saisies7, cAlertes, cPannes) {
  const el = document.getElementById('week-grid');
  const clientIds = clients.map(c=>c.id);
  const prixMoyen = clients.length ? Math.round(clients.reduce((a,c)=>a+(c.prix_litre_fcfa||695),0)/clients.length) : 695;
  const totalH    = saisies7.reduce((a,s)=>a+(s.heures_marche||0),0);
  const totalL    = saisies7.reduce((a,s)=>a+(s.litres_ajoutes||0),0);
  const totalCout = Math.round(totalL*prixMoyen);
  const joursAvec = new Set(saisies7.map(s=>s.date)).size;
  const totalG    = cGroupes.filter(g=>clientIds.includes(g.client_id)).length;
  const taux      = totalG>0?Math.round(joursAvec/(7*totalG)*100):0;

  el.innerHTML = `
    <div class="wk"><div class="wk-val">${Math.round(totalH)}h</div><div class="wk-label">Heures de marche</div><div class="wk-sub">Total groupe</div></div>
    <div class="wk"><div class="wk-val">${fmtNum(totalL)}L</div><div class="wk-label">Litres consommés</div><div class="wk-sub">${clients.length} hôtels</div></div>
    <div class="wk"><div class="wk-val" style="font-size:20px">${totalCout>0?fmtNum(Math.round(totalCout/1000))+'k':'—'}</div><div class="wk-label">Coût estimé FCFA</div><div class="wk-sub">~${prixMoyen} FCFA/L</div></div>
    <div class="wk"><div class="wk-val" style="color:${taux>=80?'var(--vert)':taux>=50?'var(--orange)':'var(--rouge)'}">${taux}%</div><div class="wk-label">Taux de saisie</div><div class="wk-sub">${joursAvec}j / ${7*totalG} attendus</div></div>
  `;
}

loadAll();
</script>
